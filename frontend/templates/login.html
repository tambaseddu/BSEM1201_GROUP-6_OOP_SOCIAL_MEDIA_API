<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Hub - Authentication</title>
    <link rel="stylesheet" href="/static/style.css?v=2.0">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <header class="auth-brand">
            <h1>ConnectHub</h1>
            <p>Join the object-oriented developer network</p>
        </header>

        <div class="auth-container">
            <div class="auth-card" id="login-box">
                <h2>Welcome Back</h2>
                <p class="subtitle">Log in to access your dashboard feed</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-block">Sign In</button>
                </form>
                <div class="auth-toggle-footer">
                    <span>New here?</span> <a href="#" onclick="toggleAuthPanels('register-box', 'login-box')">Create an account</a>
                </div>
            </div>

            <div class="auth-card" id="register-box">
                <h2>Create Account</h2>
                <p class="subtitle">Get started with your profile platform</p>
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-block btn-accent">Sign Up</button>
                </form>
                <div class="auth-toggle-footer">
                    <span>Already have an account?</span> <a href="#" onclick="toggleAuthPanels('login-box', 'register-box')">Log In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Smoothly display or swap focus panels
        function toggleAuthPanels(showId, hideId) {
            document.getElementById(showId).classList.add('active-panel');
            document.getElementById(hideId).classList.remove('active-panel');
        }

        // Default initialization: show login first
        document.getElementById('login-box').classList.add('active-panel');

        // --- Handle Sign In ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('login-username').value);
            formData.append('password', document.getElementById('login-password').value);

            try {
                const response = await fetch('/auth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    window.location.href = '/dashboard';
                } else if (response.status === 403) {
                    // 🛑 Catch the security wall if they try logging in without verifying first
                    alert(data.detail || 'Account unverified. Redirecting to verification page...');
                    window.location.href = '/verify';
                } else {
                    alert(data.detail || 'Invalid server credentials. Please try again.');
                }
            } catch (err) {
                console.error("Authentication error:", err);
                alert("An error occurred connecting to the server.");
            }
        });

        // --- Handle Registration ---
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Account created successfully! A 6-digit verification code has been sent to your email.');
                    // 🌟 Redirect directly to the verification portal, passing the email context string cleanly
                    window.location.href = `/verify?email=${encodeURIComponent(data.email)}`;
                } else {
                    alert(data.detail || 'Registration failed. Username or email might be taken.');
                }
            } catch (err) {
                console.error("Registration error:", err);
                alert("An error occurred connecting to the server.");
            }
        });
    </script>
</body>
</html>
