<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Hub - Dashboard</title>
    <link rel="stylesheet" href="/static/style.css?v=2.0">
    <style>
        /* --- 🔍 TOGGLEABLE SIDEBAR PANELS ENGINE --- */
        .search-panel, .notifications-panel {
            background: #1e293b; /* Matches dark theme sidebar/workspace foundations */
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 1rem;
        }

        /* Responsive Grid State Management */
        .main-workspace-grid.search-active,
        .main-workspace-grid.panel-active {
            grid-template-columns: 1fr 300px; /* Allocates space for whichever panel is active */
        }

        /* Explicit Display State Rules */
        .main-workspace-grid.search-active .search-panel {
            display: flex; 
        }

        .main-workspace-grid.panel-active .notifications-panel {
            display: flex; 
        }

        .search-box label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--accent-color, #dbb583);
        }
        .search-input-group {
            display: flex;
            gap: 0.5rem;
        }
        .search-input-group input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            outline: none;
        }
        .search-input-group input:focus {
            border-color: #dbb583;
        }
        .search-results-box {
            margin-top: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .search-result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .search-result-row:last-child {
            border-bottom: none;
        }
        .search-user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .search-avatar-alt {
            width: 28px;
            height: 28px;
            background: #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        .search-header, .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .search-header h3, .notifications-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #fff;
        }
        .btn-close-search {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .btn-close-search:hover {
            color: #fff;
        }
        /* Visual cue for navigation selections */
        nav a.active {
            background: rgba(219, 181, 131, 0.15);
            color: #dbb583 !important;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo">ConnectHub</div>
            
            <div class="user-profile-widget" id="user-profile-widget">
                <div class="avatar-placeholder">💻</div>
                <h4 id="profile-username">@user</h4>
                <div class="social-stats">
                    <div><span id="stat-followers">0</span><small>Followers</small></div>
                    <div><span id="stat-following">0</span><small>Following</small></div>
                </div>
            </div>

            <nav>
                <a href="/dashboard" id="feed-nav-btn" class="active">📰 Global Feed</a>
                <a href="#" id="toggle-search-btn">🔍 Search Users</a>
                <a href="#" id="toggle-notif-btn">🔔 Notifications</a>
                <a href="#" onclick="logout()">🚪 Sign Out</a>
            </nav>
        </aside>

        <div class="main-workspace-grid" id="workspace-grid">
            
            <main class="feed-container">
                <header class="feed-header">
                    <h2>Your Feed Engine</h2>
                </header>

                <div class="create-post-card">
                    <form id="post-form" enctype="multipart/form-data"> 
                        <textarea id="post-content" placeholder="What's on your mind today?" required></textarea>
                        <input type="file" id="post-media-file" accept="image/*" style="width:100%; color:rgb(161, 154, 154); margin-top:0.5rem; font-size:0.85rem;">
                        <button type="submit" class="btn" style="margin-top:0.75rem;">Publish Post</button>
                    </form>
                </div>

                <div id="posts-stream"></div>
            </main>

            <aside class="search-panel">
                <div class="search-header">
                    <h3>Discover Creators</h3>
                    <button class="btn-close-search" onclick="closeSearchPanel()">×</button>
                </div>
                <div class="search-box">
                    <label for="user-search-input">Network Search</label>
                    <div class="search-input-group">
                        <input type="text" id="user-search-input" placeholder="Enter username..." onkeydown="if(event.key === 'Enter') triggerUserSearch()">
                        <button type="button" class="btn" style="margin-top: 0; padding: 0.5rem 1rem;" onclick="triggerUserSearch()">Go</button>
                    </div>
                    <div id="search-results-wrapper" class="search-results-box" style="display: none;"></div>
                </div>
            </aside>

            <aside class="notifications-panel">
                <div class="notifications-header">
                    <h3>Notifications Inbox</h3>
                    <button class="btn-clear-all" onclick="markAllNotificationsRead()">Mark all read</button>
                </div>
                <div id="notifications-stream">
                    <p class="empty-state">Checking for alerts...</p>
                </div>
            </aside>

        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/';

        let loggedInUser = { id: null, username: "user" };
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            
            loggedInUser.username = payload.sub || payload.username || payload.user || "user"; 
            if (payload.id) loggedInUser.id = payload.id;
            
            console.log("Logged In User Identified As:", loggedInUser.username);
        } catch(e) {
            console.error("Token decoding error:", e);
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/';
        }

        // Context-aware sanitization context options
        const escapeForHtmlAttr = (str) => {
            if (!str) return '';
            return str
                .replace(/\\/g, '\\\\')
                .replace(/`/g, '\\`')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        };

        const escapeTextContent = (str) => {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        };

        // --- 🔍 USER DISCOVERY PANEL ENGINE ---
        async function triggerUserSearch() {
            const queryField = document.getElementById('user-search-input');
            const resultsWrapper = document.getElementById('search-results-wrapper');
            const queryString = queryField.value.trim();

            if (!queryString) {
                resultsWrapper.style.display = 'none';
                resultsWrapper.innerHTML = '';
                return;
            }

            try {
                const response = await fetch(`/users/search?q=${encodeURIComponent(queryString)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const matchedUsers = await response.json();
                    resultsWrapper.innerHTML = '';

                    if (matchedUsers.length === 0) {
                        resultsWrapper.innerHTML = '<p class="empty-state" style="padding: 1rem; margin:0;">No connections found.</p>';
                        resultsWrapper.style.display = 'block';
                        return;
                    }

                    matchedUsers.forEach(user => {
                        const row = document.createElement('div');
                        row.className = 'search-result-row';
                        
                        const avatarContent = user.profile_pic_url 
                            ? `<img src="${encodeURI(user.profile_pic_url)}" alt="Profile" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">`
                            : `<div class="search-avatar-alt">👤</div>`;

                        const displayUser = user.username ? user.username.replace(/@/g, '') : 'unknown';
                        const sanitizedUser = escapeTextContent(displayUser);

                        row.innerHTML = `
                            <div class="search-user-info">
                                ${avatarContent}
                                <span style="color: #fff; font-weight: 500; font-size:0.85rem;">@${sanitizedUser}</span>
                            </div>
                            <button class="btn-follow-inline" onclick="toggleFollowUser(${user.id})" style="margin: 0; padding: 4px 8px; font-size: 0.75rem;">
                                Follow/Unfollow
                            </button>
                        `;
                        resultsWrapper.appendChild(row);
                    });
                    resultsWrapper.style.display = 'block';
                }
            } catch (err) {
                console.error("Discovery Engine error:", err);
            }
        }

        function closeSearchPanel() {
            const workspaceGrid = document.getElementById("workspace-grid");
            const searchBtn = document.getElementById("toggle-search-btn");
            const feedNavBtn = document.getElementById("feed-nav-btn");

            workspaceGrid.classList.remove("search-active");
            searchBtn.classList.remove("active");
            if (!workspaceGrid.classList.contains("panel-active")) {
                feedNavBtn.classList.add("active");
            }
        }

        // --- 👥 PROFILE METRICS LOADER ---
        async function fetchProfileStats() {
            const cleanDisplayUser = loggedInUser.username.replace(/@/g, '');
            document.getElementById('profile-username').innerText = `@${cleanDisplayUser}`;
            
            try {
                const profileRes = await fetch('/users/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (profileRes.ok) {
                    const profile = await profileRes.json();
                    document.getElementById('stat-followers').innerText = profile.followers_count ?? 0;
                    document.getElementById('stat-following').innerText = profile.following_count ?? 0;
                    return;
                }
            } catch(e) {
                console.warn("Direct profile route unavailable, parsing active feed stream context instead...");
            }

            try {
                const feedRes = await fetch('/posts/detailed-feed', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(feedRes.ok) {
                    const feed = await feedRes.json();
                    const cleanTarget = loggedInUser.username.replace(/@/g,'').trim().toLowerCase();
                    
                    const selfmatch = feed.find(p => p.author && (p.author.username || p.author).replace(/@/g,'').trim().toLowerCase() === cleanTarget);
                    if(selfmatch && selfmatch.author) {
                        document.getElementById('stat-followers').innerText = selfmatch.author.followers_count ?? 0;
                        if(selfmatch.author.following_count !== undefined) {
                            document.getElementById('stat-following').innerText = selfmatch.author.following_count;
                        }
                    }
                }
            } catch (err) {
                console.error("Profile fall-back lookup pipeline dropped:", err);
            }
        }

        // --- 📰 SYSTEM STREAM LOADER ---
        async function loadFeed() {
            const response = await fetch('/posts/detailed-feed', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const posts = await response.json();
                const stream = document.getElementById('posts-stream');
                stream.innerHTML = ''; 
                
                if(posts.length === 0) {
                    stream.innerHTML = '<p class="empty-state">No posts in the network yet.</p>';
                    return;
                }
                
                const cleanLoggedInUser = loggedInUser.username.replace(/@/g, '').trim().toLowerCase();

                posts.forEach(post => {
                    let authorName = "";
                    let authorId = null;
                    let followersCount = 0;

                    if (post.author && typeof post.author === 'object') {
                        authorName = post.author.username || post.author.name || "";
                        authorId = post.author.id;
                        followersCount = post.author.followers_count ?? 0;
                    } else if (typeof post.author === 'string') {
                        authorName = post.author;
                    }

                    const cleanAuthorName = authorName.replace(/@/g,'').trim().toLowerCase();
                    const isPostOwner = cleanAuthorName === cleanLoggedInUser;

                    // Diagnostic Tracer to check owner visibility matching rules in DevTools
                    console.log(`[Post Ownership] ID: ${post.post_id || post.id} | Author: "${cleanAuthorName}" | Viewer: "${cleanLoggedInUser}" | Match: ${isPostOwner}`);

                    let commentsHTML = '';
                    if (post.comments && post.comments.length > 0) {
                        post.comments.forEach(comment => {
                            let commentUsername = "";
                            if (comment.author) {
                                commentUsername = typeof comment.author === 'object' ? (comment.author.username || comment.author.name || "") : comment.author;
                            } else {
                                commentUsername = comment.commenter_username || comment.username || "";
                            }

                            const cleanCommenter = commentUsername.replace(/@/g, '').trim().toLowerCase();
                            const isCommentOwner = cleanCommenter === cleanLoggedInUser;

                            const targetCommentId = comment.id || comment.comment_id || comment._id;
                            const safeCommentContentAttr = escapeForHtmlAttr(comment.content);
                            const sanitizedCommentText = escapeTextContent(comment.content);
                            const sanitizedCommenterName = escapeTextContent(commentUsername.replace(/@/g, ''));

                            commentsHTML += `
                                <div class="comment-item" style="display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0;">
                                    <div>
                                        <strong>@${sanitizedCommenterName}:</strong>
                                        <span>${sanitizedCommentText}</span>
                                    </div>
                                    ${isCommentOwner ? `
                                    <div class="comment-actions" style="display: flex; gap: 4px;">
                                        <button class="comment-action-edit" style="background:none; border:none; cursor:pointer;"
                                            onclick="openEditComment(${targetCommentId}, \`${safeCommentContentAttr}\`)" 
                                            title="Edit Comment">✏️</button>
                                        <button class="comment-action-delete" style="background:none; border:none; cursor:pointer;"
                                            onclick="deleteComment(${targetCommentId})" 
                                            title="Delete Comment">🗑️</button>
                                    </div>
                                    ` : ''}
                                </div>
                            `;
                        });
                    } else {
                        commentsHTML = `<p class="no-comments-state">No comments on this thread yet.</p>`;
                    }

                    const safePostContentAttr = escapeForHtmlAttr(post.content);
                    const sanitizedPostText = escapeTextContent(post.content);
                    const sanitizedAuthorDisplay = escapeTextContent(authorName.replace(/@/g,''));
                    const targetPostId = post.post_id || post.id;

                    stream.innerHTML += `
                        <div class="post-card" style="margin-bottom: 1.5rem; background: #1e293b; padding: 1.25rem; border-radius: 8px;">
                            <div class="post-meta" style="display:flex; gap:10px; align-items:center; margin-bottom:0.75rem; font-size:0.85rem; color:#94a3b8;">
                                <strong style="color:#fff;">@${sanitizedAuthorDisplay}</strong> 
                                <span class="followers-badge">👥 ${followersCount} followers</span>
                                <span class="date">${post.created_at ? new Date(post.created_at).toLocaleDateString() : ''}</span>
                                ${(!isPostOwner && authorId) ? 
                                    `<button class="btn-follow-inline" onclick="toggleFollowUser(${authorId})" style="background:#dbb583; border:none; padding:2px 6px; border-radius:4px; cursor:pointer; font-size:0.75rem;">Follow/Unfollow</button>` : ''
                                }
                            </div>
                            <p class="post-body" style="color:#f1f5f9; margin-bottom:1rem;">${sanitizedPostText}</p>

                            ${post.media_url ? `
                                <div class="post-media-container" style="margin-bottom:1rem;">
                                    <img src="${encodeURI(post.media_url)}" alt="User uploaded asset" class="posted-feed-img" style="max-width:100%; border-radius:6px;">
                                </div>
                            ` : ''}
                    
                            <div class="post-actions" style="margin-top: 1rem; display:flex; gap:8px;">
                                <button onclick="likePost(${targetPostId})" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:4px 8px; border-radius:4px; cursor:pointer;">👍 ${post.likes_count ?? 0} Likes</button>
                                ${isPostOwner ? `
                                    <button class="btn-edit" onclick="openEditPost(${targetPostId}, \`${safePostContentAttr}\`)" style="background:#334155; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">✏️ Edit</button>
                                    <button class="btn-delete" onclick="deletePost(${targetPostId})" style="background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">🗑️ Delete</button>
                                ` : ''}
                            </div>

                            <div class="comments-section" style="margin-top:1.25rem; border-top:1px solid rgba(255,255,255,0.05); padding-top:1rem;">
                                <h5 style="margin:0 0 0.5rem 0; font-size:0.9rem; color:#dbb583;">Discussion Thread</h5>
                                <div class="comments-list" style="font-size:0.85rem; color:#cbd5e1; margin-bottom:0.75rem;">
                                    ${commentsHTML}
                                </div>
                                <div class="comment-input-box" style="display:flex; gap:6px;">
                                    <input type="text" id="comment-input-${targetPostId}" placeholder="Write a reply execution..." style="flex:1; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); border-radius:4px; padding:4px 8px; color:#fff; font-size:0.85rem;">
                                    <button onclick="submitComment(${targetPostId})" style="background:#dbb583; border:none; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:0.85rem;">Reply</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // --- 👥 SOCIAL GRAPH INTERACTION SYSTEM ---
        async function toggleFollowUser(targetUserId) {
            if(!targetUserId) return;
            const response = await fetch(`/users/${targetUserId}/follow`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                const data = await response.json();
                alert(data.message); 
                
                const followingElement = document.getElementById('stat-following');
                let currentFollowingCount = parseInt(followingElement.innerText) || 0;
                
                if (data.message && data.message.toLowerCase().includes('unfollowed')) {
                    followingElement.innerText = Math.max(0, currentFollowingCount - 1);
                } else if (data.message && data.message.toLowerCase().includes('followed')) {
                    followingElement.innerText = currentFollowingCount + 1;
                }

                await loadFeed();
                await fetchProfileStats();
                loadNotifications();
                
                const queryField = document.getElementById('user-search-input');
                if(queryField && queryField.value.trim() !== "") {
                    triggerUserSearch();
                }
            } else {
                const errorData = await response.json();
                alert(`Action failed: ${errorData.detail || 'Could not execute follow.'}`);
            }
        }

        // --- 📝 POST EDITING ENGINE ---
        async function openEditPost(postId, currentContent) {
            const editPrompt = prompt("Modify your post body content:", currentContent);
            if (editPrompt === null) return; 
            if (!editPrompt.trim()) {
                alert("Post content cannot be left completely empty.");
                return;
            }

            const response = await fetch(`/posts/${postId}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ content: editPrompt.trim() })
            });

            if (response.ok) {
                loadFeed();
            } else {
                const err = await response.json();
                alert(`Failed to apply post adjustments: ${err.detail || 'Server rejection.'}`);
            }
        }

        // --- 💬 COMMENT EDITING ENGINE ---
        async function openEditComment(commentId, currentContent) {
            const editPrompt = prompt("Modify your comment text:", currentContent);
            if (editPrompt === null) return; 
            if (!editPrompt.trim()) {
                alert("Comment content cannot be left empty.");
                return;
            }

            const response = await fetch(`/comments/${commentId}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ content: editPrompt.trim() })
            });

            if (response.ok) {
                loadFeed();
            } else {
                const err = await response.json();
                alert(`Failed to apply comment adjustments: ${err.detail || 'Server rejection.'}`);
            }
        }

        // --- 💬 COMMENT DELETION WRAPPER ---
        async function deleteComment(commentId) {
            if (!commentId) return;
            if (!confirm("Are you sure you want to scrub this comment reply?")) return;

            const response = await fetch(`/comments/${commentId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                loadFeed(); 
            } else {
                const err = await response.json();
                alert(`Failed to discard comment: ${err.detail || 'Access denied.'}`);
            }
        }       

        // --- 💬 COMMENTS DISPATCH ---
        async function submitComment(postId) {
            const inputField = document.getElementById(`comment-input-${postId}`);
            const content = inputField.value.trim();
            if(!content) return;

            const response = await fetch(`/posts/${postId}/comments`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ content: content })
            });

            if (response.ok) {
                inputField.value = '';
                loadFeed();
                loadNotifications();
            }
        }

        // --- 📝 FEED PUBLICATION DISPATCH ---
        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('post-content').value;
            const fileInput = document.getElementById('post-media-file');
            const formData = new FormData();
            formData.append('content', content);
            
            if (fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }

            const response = await fetch('/posts', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData 
            });

            if (response.ok) {
                document.getElementById('post-content').value = '';
                document.getElementById('post-media-file').value = ''; 
                loadFeed(); 
                fetchProfileStats();
            } else {
                const err = await response.json();
                alert(`Failed to upload post: ${err.detail || 'Internal verification error.'}`);
            }
        });

        async function deletePost(postId) {
            if (!confirm("Are you sure you want to delete this post?")) return;
            const response = await fetch(`/posts/${postId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                loadFeed();
                fetchProfileStats();
            }
        }

        async function likePost(postId) {
            const response = await fetch(`/posts/${postId}/like`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                loadFeed();
                loadNotifications();
            }
        }

        // --- 🔔 NOTIFICATIONS INBOX HANDLING ---
        async function loadNotifications() {
            const response = await fetch('/notifications', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const notifications = await response.json();
                const stream = document.getElementById('notifications-stream');
                stream.innerHTML = '';

                if (notifications.length === 0) {
                    stream.innerHTML = '<p class="empty-state">Your inbox is completely clear! ✨</p>';
                    return;
                }

                notifications.forEach(notif => {
                    const unreadClass = notif.is_read ? '' : 'unread-alert';
                    const sanitizedNotifContent = escapeTextContent(notif.content);
                    stream.innerHTML += `
                        <div class="notification-item ${unreadClass}">
                            <p class="notif-text">${sanitizedNotifContent}</p>
                            <span class="notif-time">${new Date(notif.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            ${!notif.is_read ? `<button class="btn-read-tick" onclick="markAsRead(${notif.id})">✓</button>` : ''}
                        </div>
                    `;
                });
            }
        }

        async function markAsRead(notifId) {
            const response = await fetch(`/notifications/${notifId}/read`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) loadNotifications();
        }

        async function markAllNotificationsRead() {
            const response = await fetch('/notifications/read-all', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) loadNotifications();
        }

        // --- 🔘 SIDEBAR NOTIFICATION & SEARCH PANEL MOTOR ---
        document.addEventListener("DOMContentLoaded", () => {
            const notifBtn = document.getElementById("toggle-notif-btn");
            const searchBtn = document.getElementById("toggle-search-btn");
            const feedNavBtn = document.getElementById("feed-nav-btn");
            const workspaceGrid = document.getElementById("workspace-grid");

            // Run stream initializations safely now that DOM elements exist
            fetchProfileStats();
            loadFeed();

            if (notifBtn && workspaceGrid) {
                notifBtn.addEventListener("click", (event) => {
                    event.preventDefault(); 
                    workspaceGrid.classList.remove("search-active");
                    if(searchBtn) searchBtn.classList.remove("active"); 

                    const isOpen = workspaceGrid.classList.toggle("panel-active");
                    notifBtn.classList.toggle("active");

                    if (isOpen) {
                        if (feedNavBtn) feedNavBtn.classList.remove("active");
                        loadNotifications();
                    } else {
                        if (feedNavBtn && !workspaceGrid.classList.contains("search-active")) {
                            feedNavBtn.classList.add("active");
                        }
                    }
                });
            }

            if (searchBtn && workspaceGrid) {
                searchBtn.addEventListener("click", (event) => {
                    event.preventDefault();
                    workspaceGrid.classList.remove("panel-active");
                    if(notifBtn) notifBtn.classList.remove("active");

                    const isOpen = workspaceGrid.classList.toggle("search-active");
                    searchBtn.classList.toggle("active");

                    if (isOpen) {
                        if (feedNavBtn) feedNavBtn.classList.remove("active");
                    } else {
                        if (feedNavBtn && !workspaceGrid.classList.contains("panel-active")) {
                            feedNavBtn.classList.add("active");
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
